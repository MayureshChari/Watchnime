<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Start</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 400px;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        /* Style the button with gradient background */
        .start-button {
            display: inline-block;
            padding: 12px 24px;
            font-size: 18px;
            color: #fff;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
            /* Gradient background */
            background-image: linear-gradient(to right, #ff6347, #ffa500); /* Gradient from red to orange */
        }

        /* Hover effect */
        .start-button:hover {
            filter: brightness(1.1); /* Brighten the button on hover */
        }

        /* Popup style */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
            z-index: 999; /* Ensure it's on top */
        }

        .popup-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .popup h2 {
            margin-top: 0;
        }

        .popup button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .popup button:hover {
            background-color: #ddd; /* Light gray on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Flappy Bird</h1>
        <p>Click below to select difficulty:</p>
        <button class="start-button" onclick="showDifficultyPopup()">Start Game</button>
    </div>

    <!-- Difficulty Popup -->
    <div id="difficultyPopup" class="popup" onclick="hideDifficultyPopup(event)">
        <div class="popup-content">
            <h2>Select Difficulty</h2>
            <button onclick="redirectToPage('easy')">Easy</button><br>
            <button onclick="redirectToPage('normal')">Normal</button><br>
            <button onclick="redirectToPage('hard')">Hard</button><br>
            <button onclick="redirectToPage('extreme')">Extreme</button>
        </div>
    </div>

    <script>
        function showDifficultyPopup() {
            var popup = document.getElementById('difficultyPopup');
            popup.style.display = 'block';
        }

        function hideDifficultyPopup(event) {
            var popup = document.getElementById('difficultyPopup');
            if (event.target == popup) {
                popup.style.display = 'none';
            }
        }

        function redirectToPage(difficulty) {
            var page = '';
            switch (difficulty) {
                case 'easy':
                    page = 'Flappy_Naruto_Easy.html';
                    break;
                case 'normal':
                    page = 'Flappy_Naruto_Normal.html';
                    break;
                case 'hard':
                    page = 'Flappy_Naruto_Hard.html';
                    break;
                case 'extreme':
                    page = 'Flappy_Naruto_Extreme.html';
                    break;
                default:
                    page = 'Flappy_Naruto_Normal.html'; // Default to Normal difficulty
            }
            window.location.href = page;
        }
    </script>
</body>
</html>
